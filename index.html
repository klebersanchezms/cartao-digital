<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CNCShop - Cartão Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --vermelho: #e31e24;
            --preto-fosco: #1a1a1a;
            --bg-base: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* --- PLANO DE FUNDO (MOSAICO GRANDE E INCLINADO) --- */
        body::before {
            content: "";
            position: fixed;
            top: -150%; 
            left: -150%;
            width: 400%;
            height: 400%;
            background-image: url('Logo.png');
            background-repeat: repeat;
            /* IMAGENS BEM MAIORES */
            background-size: 380px; 
            z-index: -1;
            
            /* INCLINAÇÃO DINÂMICA */
            transform: rotate(-25deg);
            
            /* TRANSPARÊNCIA DE 70% (Exibe 30% da intensidade) */
            opacity: 0.3; 
            pointer-events: none;
        }

        /* --- CONTAINER DO CARTÃO --- */
        .card-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background-color: var(--bg-base);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 60px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* --- CABEÇALHO --- */
        .header-image {
            width: 100%;
            height: 25vh;
            min-height: 200px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%);
        }

        .header-image h2 {
            color: white;
            font-size: clamp(1.1rem, 5vw, 1.4rem);
            text-transform: uppercase;
            padding: 0 25px;
            text-align: center;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        /* --- LOGO PRINCIPAL --- */
        .logo-area {
            margin-top: -50px;
            padding: 0 12%;
            z-index: 10;
        }

        .logo-area img {
            width: 100%;
            height: auto;
            background: white;
            padding: 18px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .instruction {
            font-size: 0.8rem;
            color: #888;
            margin: 35px 0 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        /* --- BOTÕES RESPONSIVOS --- */
        .links-container {
            padding: 0 10% 50px;
            flex-grow: 1;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--preto-fosco);
            color: white;
            text-decoration: none;
            margin-bottom: 16px;
            padding: 20px 24px;
            border-radius: 100px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: scale(0.92);
            background: #000;
        }

        .btn-content {
            display: flex;
            align-items: center;
        }

        .btn i {
            font-size: 1.7rem;
            margin-right: 20px;
            min-width: 35px;
            text-align: center;
        }

        .btn-text span {
            display: block;
            font-size: 0.65rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .btn-text strong {
            font-size: 1rem;
            letter-spacing: 1px;
        }

        /* CORES DOS ÍCONES */
        .fa-whatsapp { color: #25D366; }
        .fa-phone { color: #3498db; }
        .fa-globe { color: var(--vermelho); }
        .fa-location-dot { color: #f1c40f; }
        .fa-envelope { color: #ffffff; }

        .footer-text {
            font-size: 0.75rem;
            color: #bbb;
            margin-top: 30px;
            text-align: center;
            font-weight: 500;
        }

        /* --- AJUSTES DESKTOP --- */
        @media (min-width: 768px) {
            .card-container {
                border-radius: 30px;
                min-height: auto;
                height: 94vh;
                margin: 20px 0;
            }
            body::before {
                opacity: 0.25; /* Um pouco mais visível no desktop */
                background-size: 420px; /* Ainda maior no desktop */
            }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <header class="header-image">
            <h2>Especialista em Peças para CNC</h2>
        </header>

        <section class="logo-area">
            <img src="Logo.png" alt="Grupo Manutex CNC Shop">
        </section>

        <p class="instruction">Toque para interagir</p>

        <nav class="links-container">
            <a href="https://wa.me/551632411144" class="btn">
                <div class="btn-content">
                    <i class="fab fa-whatsapp"></i>
                    <div class="btn-text">
                        <span>Fale conosco</span>
                        <strong>VENDAS WHATSAPP</strong>
                    </div>
                </div>
                <i class="fas fa-chevron-right" style="font-size: 0.8rem; opacity: 0.2;"></i>
            </a>

            <a href="tel:1632411144" class="btn">
                <div class="btn-content">
                    <i class="fas fa-phone"></i>
                    <div class="btn-text">
                        <span>Ligar para nós</span>
                        <strong>(16) 3241-1144</strong>
                    </div>
                </div>
            </a>

            <a href="https://www.cncshop.com.br" target="_blank" class="btn">
                <div class="btn-content">
                    <i class="fas fa-globe"></i>
                    <div class="btn-text">
                        <span>Acesse nosso site</span>
                        <strong>WWW.CNCSHOP.COM.BR</strong>
                    </div>
                </div>
            </a>

            <a href="https://maps.google.com/?q=CNCShop+Grupo+Manutex" target="_blank" class="btn">
                <div class="btn-content">
                    <i class="fas fa-location-dot"></i>
                    <div class="btn-text">
                        <span>Como chegar</span>
                        <strong>NOSSO ENDEREÇO</strong>
                    </div>
                </div>
            </a>

            <a href="mailto:vendas@cncshop.com.br" class="btn">
                <div class="btn-content">
                    <i class="fas fa-envelope"></i>
                    <div class="btn-text">
                        <span>Envie um e-mail</span>
                        <strong>VENDAS@CNCSHOP.COM.BR</strong>
                    </div>
                </div>
            </a>

            <p class="footer-text">Grupo Manutex CNC © 2026</p>
        </nav>
    </div>

</body>
</html>
