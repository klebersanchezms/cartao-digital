<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CNCShop - Cartão Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --vermelho: #e31e24;
            --preto-fosco: #1a1a1a;
            --bg-card: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Alinhamento ao topo para evitar cortes inferiores */
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            padding: 20px 0;
        }

        /* --- PLANO DE FUNDO: MOSAICO GIGANTE (70% TRANSPARÊNCIA) --- */
        body::before {
            content: "";
            position: fixed;
            top: -150%; 
            left: -150%;
            width: 400%;
            height: 400%;
            background-image: url('Logo.png'); /* */
            background-repeat: repeat;
            background-size: 420px; /* Tamanho grande solicitado */
            z-index: -1;
            transform: rotate(-25deg);
            opacity: 0.3; /* 70% de transparência */
            pointer-events: none;
        }

        /* --- CONTAINER DO CARTÃO --- */
        .card-container {
            width: 92%;
            max-width: 450px;
            background-color: var(--bg-card);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            border-radius: 25px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        /* --- CABEÇALHO --- */
        .header-image {
            width: 100%;
            height: 220px;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.2)), 
                        url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            clip-path: polygon(0 0, 100% 0, 100% 80%, 0% 100%);
        }

        .header-image h2 {
            color: white;
            font-size: 1.2rem;
            text-transform: uppercase;
            padding: 0 20px 30px 20px;
            text-align: center;
            letter-spacing: 1.5px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        }

        /* --- LOGO PRINCIPAL: AJUSTADO PARA NÃO CORTAR --- */
        .logo-area {
            margin-top: -65px; /* Rebaixado para não cobrir o texto do topo */
            padding: 0 12%;
            z-index: 10;
        }

        .logo-area img {
            width: 100%;
            height: auto;
            background: white;
            padding: 15px;
            border-radius: 18px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .instruction {
            font-size: 0.75rem;
            color: #888;
            margin: 25px 0 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: center;
        }

        /* --- BOTÕES --- */
        .links-container {
            padding: 0 8% 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--preto-fosco);
            color: white;
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 50px;
            transition: transform 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-content {
            display: flex;
            align-items: center;
        }

        .btn i {
            font-size: 1.5rem;
            margin-right: 15px;
            min-width: 30px;
            text-align: center;
        }

        .btn-text span {
            display: block;
            font-size: 0.6rem;
            color: #aaa;
            text-transform: uppercase;
        }

        .btn-text strong {
            font-size: 0.95rem;
        }

        /* CORES DOS ÍCONES */
        .fa-whatsapp { color: #25D366; }
        .fa-phone { color: #3498db; }
        .fa-globe { color: var(--vermelho); }
        .fa-location-dot { color: #f1c40f; }
        .fa-envelope { color: #ffffff; }

        .footer-text {
            font-size: 0.7rem;
            color: #aaa;
            text-align: center;
            margin-top: 10px;
            padding-bottom: 20px;
        }

        /* AJUSTE PARA COMPUTADOR */
        @media (min-width: 768px) {
            body { align-items: center; }
            .card-container { height: auto; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <header class="header-image">
            <h2>Especialista em Peças para CNC</h2>
        </header>

        <section class="logo-area">
            <img src="Logo.png" alt="CNCShop Logo"> </section>

        <p class="instruction">Toque para interagir</p>

        <nav class="links-container">
            <a href="https://wa.me/551632411144" class="btn">
                <div class="btn-content">
                    <i class="fab fa-whatsapp"></i>
                    <div class="btn-text">
                        <span>Fale no WhatsApp</span>
                        <strong>VENDAS WHATSAPP</strong>
                    </div>
                </div>
            </a>

            <a href="tel:1632411144" class="btn">
                <div class="btn-content">
                    <i class="fas fa-phone"></i>
                    <div class="btn-text">
                        <span>Ligar Agora</span>
                        <strong>(16) 3241-1144</strong>
                    </div>
                </div>
            </a>

            <a href="https://www.cncshop.com.br" target="_blank" class="btn">
                <div class="btn-content">
                    <i class="fas fa-globe"></i>
                    <div class="btn-text">
                        <span>Nossa Loja</span>
                        <strong>WWW.CNCSHOP.COM.BR</strong>
                    </div>
                </div>
            </a>

            <a href="https://maps.app.goo.gl/YourLink" target="_blank" class="btn">
                <div class="btn-content">
                    <i class="fas fa-location-dot"></i>
                    <div class="btn-text">
                        <span>Localização</span>
                        <strong>NOSSO ENDEREÇO</strong>
                    </div>
                </div>
            </a>

            <a href="mailto:vendas@cncshop.com.br" class="btn">
                <div class="btn-content">
                    <i class="fas fa-envelope"></i>
                    <div class="btn-text">
                        <span>Envie um E-mail</span>
                        <strong>VENDAS@CNCSHOP.COM.BR</strong>
                    </div>
                </div>
            </a>

            <p class="footer-text">Grupo Manutex CNC © 2026</p>
        </nav>
    </div>

</body>
</html>
