<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CNCShop - Cartão Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --vermelho: #e31e24;
            --preto-fosco: #1a1a1a;
            --bg-base: #f8f8f8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* --- PLANO DE FUNDO (MOSAICO INCLINADO) --- */
        body::before {
            content: "";
            position: fixed;
            top: -100%; 
            left: -100%;
            width: 300%;
            height: 300%;
            background-image: url('Logo.png');
            background-repeat: repeat;
            /* TAMANHO MAIOR DAS IMAGENS */
            background-size: 280px; 
            z-index: -1;
            
            /* INCLINAÇÃO */
            transform: rotate(-35deg);
            
            /* TRANSPARÊNCIA EM 70% (Opacity 0.3) */
            opacity: 0.3; 
            pointer-events: none;
        }

        /* --- CONTAINER DO CARTÃO --- */
        .card-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background-color: var(--bg-base);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* --- CABEÇALHO --- */
        .header-image {
            width: 100%;
            height: 25vh;
            min-height: 190px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=800');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            clip-path: polygon(0 0, 100% 0, 100% 80%, 0% 100%);
        }

        .header-image h2 {
            color: white;
            font-size: clamp(1.1rem, 5vw, 1.3rem);
            text-transform: uppercase;
            padding: 0 20px;
            text-align: center;
            letter-spacing: 2px;
            text-shadow: 2px 2px 5px rgba(0,0,0,1);
        }

        /* --- LOGO PRINCIPAL (REBAIXADO) --- */
        .logo-area {
            margin-top: -45px;
            padding: 0 10%;
            z-index: 10;
        }

        .logo-area img {
            width: 100%;
            height: auto;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .instruction {
            font-size: 0.85rem;
            color: #666;
            margin: 30px 0 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: center;
        }

        /* --- BOTÕES --- */
        .links-container {
            padding: 0 8% 40px;
            flex-grow: 1;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--preto-fosco);
            color: white;
            text-decoration: none;
            margin-bottom: 14px;
            padding: 18px 22px;
            border-radius: 60px;
            border: 1px solid #333;
            transition: all 0.3s ease;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }

        .btn:active {
            transform: scale(0.94);
            background: #000;
        }

        .btn-content {
            display: flex;
            align-items: center;
        }

        .btn i {
            font-size: 1.6rem;
            margin-right: 18px;
            min-width: 32px;
            text-align: center;
        }

        .btn-text span {
            display: block;
            font-size: 0.7rem;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .btn-text strong {
            font-size: 1rem;
            letter-spacing: 0.8px;
        }

        /* ÍCONES COLORIDOS */
        .fa-whatsapp { color: #25D366; }
        .fa-phone { color: #3498db; }
        .fa-globe { color: var(--vermelho); }
        .fa-location-dot { color: #f1c40f; }
        .fa-envelope { color: #fff; }

        .footer-text {
            font-size: 0.75rem;
            color: #999;
            margin-top: 20px;
            text-align: center;
        }

        /* --- RESPONSIVIDADE DESKTOP --- */
        @media (min-width: 768px) {
            .card-container {
                border-radius: 25px;
                min-height: auto;
                height: 92vh;
                margin: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <header class="header-image">
            <h2>Especialista em Peças para CNC</h2>
        </header>

        <section class="logo-area">
            <img src="Logo.png" alt="CNCShop">
        </section>

        <p class="instruction">Toque para interagir</p>

        <nav class="links-container">
            <a href="https://wa.me/551632411144" class="btn">
                <div class="btn-content">
                    <i class="fab fa-whatsapp"></i>
                    <div class="btn-text">
                        <span>Fale no WhatsApp</span>
                        <strong>VENDAS WHATSAPP</strong>
                    </div>
                </div>
                <i class="fas fa-chevron-right" style="font-size: 0.8rem; opacity: 0.2;"></i>
            </a>

            <a href="tel:1632411144" class="btn">
                <div class="btn-content">
                    <i class="fas fa-phone"></i>
                    <div class="btn-text">
                        <span>Ligar Agora</span>
                        <strong>(16) 3241-1144</strong>
                    </div>
                </div>
            </a>

            <a href="https://www.cncshop.com.br" target="_blank" class="btn">
                <div class="btn-content">
                    <i class="fas fa-globe"></i>
                    <div class="btn-text">
                        <span>Acesse nosso site</span>
                        <strong>WWW.CNCSHOP.COM.BR</strong>
                    </div>
                </div>
            </a>

            <a href="https://maps.google.com/?q=CNCShop+Monte+Alto" target="_blank" class="btn">
                <div class="btn-content">
                    <i class="fas fa-location-dot"></i>
                    <div class="btn-text">
                        <span>Como Chegar</span>
                        <strong>NOSSO ENDEREÇO</strong>
                    </div>
                </div>
            </a>

            <a href="mailto:vendas@cncshop.com.br" class="btn">
                <div class="btn-content">
                    <i class="fas fa-envelope"></i>
                    <div class="btn-text">
                        <span>Enviar E-mail</span>
                        <strong>VENDAS@CNCSHOP.COM.BR</strong>
                    </div>
                </div>
            </a>

            <p class="footer-text">Grupo Manutex CNC © 2026</p>
        </nav>
    </div>

</body>
</html>
