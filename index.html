<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNCShop - Cartão Premium</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
:root{
  --vermelho:#e31e24;
  --preto:#111;
  --preto2:#1a1a1a;
  --cinza:#f3f4f6;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial;}
body{
  background:var(--cinza);
  display:flex;
  justify-content:center;
  padding:20px;
}

/* CARD */
.card{
  width:100%;
  max-width:470px;
  background:#fff;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.15);
}

/* ===== TOPO PREMIUM ===== */
.header{
  position:relative;
  padding:35px 20px 90px;
  text-align:center;
  overflow:hidden;

  background:
    radial-gradient(circle at top left, rgba(227,30,36,.25), transparent 30%),
    linear-gradient(135deg,#0f0f10,#1a1a1d,#232327);
}

/* brilho animado */
.header::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.05),transparent);
  transform:translateX(-100%);
  animation:shine 6s linear infinite;
}

/* linha vermelha */
.top-line{
  position:absolute;
  top:0;
  left:20px;
  right:20px;
  height:4px;
  background:linear-gradient(90deg,transparent,#e31e24,#ff4d4f,#e31e24,transparent);
  border-radius:999px;
}

/* curva */
.header::after{
  content:"";
  position:absolute;
  bottom:-1px;
  left:0;
  right:0;
  height:70px;
  background:#fff;
  clip-path:ellipse(70% 100% at 50% 100%);
}

.badge{
  display:inline-block;
  padding:8px 14px;
  background:rgba(255,255,255,.12);
  border-radius:999px;
  color:#fff;
  font-size:.75rem;
  margin-bottom:10px;
}

.header h1{
  color:#fff;
  font-size:1.3rem;
  font-weight:800;
}

.header span.highlight{
  color:#ff4d4f;
}

.header p{
  color:#ccc;
  font-size:.9rem;
  margin-top:6px;
}

/* LOGO */
.logo-area{
  margin-top:-60px;
  padding:0 20px;
}

.logo-box{
  background:#fff;
  padding:15px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.logo-box img{
  width:100%;
  max-height:90px;
  object-fit:contain;
}

/* CONTENT */
.content{padding:20px}

.instruction{
  text-align:center;
  font-size:.75rem;
  margin-bottom:15px;
  color:#888;
}

/* MINI BUTTONS */
.mini{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:15px;
}

.mini button,
.mini a{
  background:#f5f5f5;
  border:none;
  border-radius:15px;
  padding:12px;
  text-align:center;
  font-size:.75rem;
  cursor:pointer;
  text-decoration:none;
  color:#000;
}

.mini i{color:var(--vermelho);margin-bottom:5px}

/* BOTÕES */
.btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:linear-gradient(135deg,#111,#2a2a2a);
  color:#fff;
  text-decoration:none;
  padding:15px;
  border-radius:999px;
  margin-bottom:10px;
}

.btn i{margin-right:10px}

/* FOOTER */
.footer{
  text-align:center;
  font-size:.75rem;
  color:#888;
  margin-top:10px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:#fff;
  padding:10px 15px;
  border-radius:999px;
  opacity:0;
}

.toast.show{opacity:1}

/* ANIMAÇÃO */
@keyframes shine{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}
</style>
</head>

<body>

<div class="card">

<header class="header">
<div class="top-line"></div>

<div class="badge">CNCShop</div>
<h1>Especialista em <span class="highlight">Peças para CNC</span></h1>
<p>Atendimento rápido e especializado</p>
</header>

<div class="logo-area">
<div class="logo-box">
<img src="./logo.png">
</div>
</div>

<div class="content">

<p class="instruction">Toque para interagir</p>

<div class="mini">
<button onclick="salvar()">💾<br>Salvar</button>

<button onclick="compartilhar()">📤<br>Compartilhar</button>

<a href="https://www.google.com/maps/dir/?api=1&destination=-21.259583,-48.466944" target="_blank">
📍<br>Rota
</a>
</div>

<a href="https://wa.me/551632411144" class="btn" target="_blank">
<i class="fab fa-whatsapp"></i> WhatsApp
</a>

<a href="tel:+551632411144" class="btn">
<i class="fas fa-phone"></i> Ligar
</a>

<a href="https://www.cncshop.com.br" class="btn" target="_blank">
<i class="fas fa-globe"></i> Site
</a>

<a href="https://www.google.com/maps?q=-21.259583,-48.466944" class="btn" target="_blank">
<i class="fas fa-location-dot"></i> Endereço
</a>

<a href="mailto:vendas@cncshop.com.br" class="btn">
<i class="fas fa-envelope"></i> Email
</a>

<div class="footer">
Grupo Manutex CNC © 2026
</div>

</div>

</div>

<div class="toast" id="toast">OK</div>

<script>
function toast(msg){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

function salvar(){
  let v=`BEGIN:VCARD
VERSION:3.0
FN:CNCShop
TEL:+551632411144
END:VCARD`;

  let blob=new Blob([v],{type:"text/vcard"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="contato.vcf";
  a.click();

  toast("Contato salvo");
}

function compartilhar(){
  if(navigator.share){
    navigator.share({
      title:"CNCShop",
      url:window.location.href
    });
  }else{
    navigator.clipboard.writeText(window.location.href);
    toast("Link copiado");
  }
}
</script>

</body>
</html>
