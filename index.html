<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>CNCShop - Cartão Digital</title>
  <meta
    name="description"
    content="Cartão digital da CNCShop - Especialista em peças para CNC."
  />

  <link
    rel="preconnect"
    href="https://cdnjs.cloudflare.com"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <style>
    :root {
      --cor-primaria: #e31e24;
      --cor-primaria-escura: #b8161b;
      --cor-preta: #141414;
      --cor-preta-secundaria: #1d1d1d;
      --cor-fundo: #f3f4f6;
      --cor-card: rgba(255, 255, 255, 0.96);
      --cor-texto: #222;
      --cor-texto-suave: #6b7280;
      --cor-borda: rgba(255, 255, 255, 0.35);
      --cor-sombra: rgba(0, 0, 0, 0.18);

      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-pill: 999px;

      --shadow-card: 0 20px 50px rgba(0, 0, 0, 0.16);
      --shadow-btn: 0 10px 25px rgba(0, 0, 0, 0.18);
      --shadow-btn-hover: 0 16px 32px rgba(0, 0, 0, 0.22);

      --max-width-card: 460px;
      --transition: 0.25s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(227, 30, 36, 0.06), transparent 35%),
        var(--cor-fundo);
      color: var(--cor-texto);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 14px;
      position: relative;
      overflow-x: hidden;
    }

    /* Fundo com mosaico da logo */
    body::before {
      content: "";
      position: fixed;
      inset: -120%;
      background-image: url("Logo.png");
      background-repeat: repeat;
      background-size: 320px;
      transform: rotate(-24deg);
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
    }

    .card-container {
      width: 100%;
      max-width: var(--max-width-card);
      background: var(--cor-card);
      backdrop-filter: blur(8px);
      border: 1px solid var(--cor-borda);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      position: relative;
      z-index: 1;
    }

    .header-image {
      position: relative;
      min-height: 230px;
      padding: 32px 24px 90px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      text-align: center;
      background:
        linear-gradient(to bottom, rgba(0, 0, 0, 0.62), rgba(0, 0, 0, 0.25)),
        url("https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=1200")
        center/cover no-repeat;
    }

    .header-image::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 70px;
      background: var(--cor-card);
      clip-path: ellipse(70% 100% at 50% 100%);
    }

    .header-content {
      position: relative;
      z-index: 1;
      max-width: 300px;
    }

    .badge {
      display: inline-block;
      margin-bottom: 12px;
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: var(--radius-pill);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      backdrop-filter: blur(6px);
    }

    .header-image h1 {
      color: #fff;
      font-size: 1.35rem;
      line-height: 1.35;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
    }

    .logo-area {
      position: relative;
      z-index: 2;
      margin-top: -62px;
      padding: 0 34px;
    }

    .logo-box {
      background: #fff;
      border-radius: 22px;
      padding: 16px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.12);
      border: 1px solid rgba(0, 0, 0, 0.04);
    }

    .logo-box img {
      display: block;
      width: 100%;
      max-height: 110px;
      object-fit: contain;
    }

    .content {
      padding: 22px 24px 28px;
    }

    .instruction {
      text-align: center;
      font-size: 0.78rem;
      color: var(--cor-texto-suave);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 18px;
    }

    .links-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, var(--cor-preta), var(--cor-preta-secundaria));
      padding: 16px 18px;
      border-radius: var(--radius-pill);
      box-shadow: var(--shadow-btn);
      transition:
        transform var(--transition),
        box-shadow var(--transition),
        background var(--transition);
      outline: none;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-btn-hover);
      background: linear-gradient(135deg, #111, #252525);
    }

    .btn:active {
      transform: scale(0.985);
    }

    .btn:focus-visible {
      box-shadow:
        0 0 0 3px rgba(227, 30, 36, 0.28),
        var(--shadow-btn-hover);
    }

    .btn-content {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .btn-icon {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
    }

    .btn-icon i {
      font-size: 1.2rem;
    }

    .btn-text {
      min-width: 0;
    }

    .btn-text span {
      display: block;
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.72);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }

    .btn-text strong {
      display: block;
      font-size: 0.97rem;
      line-height: 1.3;
      word-break: break-word;
    }

    .btn-arrow {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.75);
      flex-shrink: 0;
    }

    /* Cores dos ícones */
    .fa-whatsapp { color: #25d366; }
    .fa-phone { color: #4aa3ff; }
    .fa-globe { color: var(--cor-primaria); }
    .fa-location-dot { color: #f5c542; }
    .fa-envelope { color: #ffffff; }

    .footer {
      margin-top: 20px;
      text-align: center;
    }

    .footer-text {
      font-size: 0.78rem;
      color: var(--cor-texto-suave);
      line-height: 1.5;
    }

    .footer-text strong {
      color: var(--cor-primaria);
    }

    @media (max-width: 480px) {
      .header-image {
        min-height: 210px;
        padding: 26px 18px 84px;
      }

      .header-image h1 {
        font-size: 1.15rem;
      }

      .logo-area {
        padding: 0 22px;
      }

      .content {
        padding: 20px 18px 24px;
      }

      .btn {
        padding: 15px 16px;
      }

      .btn-text strong {
        font-size: 0.92rem;
      }
    }

    @media (min-width: 768px) {
      body {
        padding: 40px 20px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="card-container" aria-label="Cartão digital CNCShop">
    <header class="header-image">
      <div class="header-content">
        <span class="badge">CNCShop</span>
        <h1>Especialista em Peças para CNC</h1>
      </div>
    </header>

    <section class="logo-area" aria-label="Logo da empresa">
      <div class="logo-box">
        <img src="Logo.png" alt="Logo da CNCShop" />
      </div>
    </section>

    <section class="content">
      <p class="instruction">Toque para interagir</p>

      <nav class="links-container" aria-label="Links de contato">
        <a
          href="https://wa.me/551632411144"
          class="btn"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Fale no WhatsApp"
        >
          <div class="btn-content">
            <div class="btn-icon">
              <i class="fab fa-whatsapp" aria-hidden="true"></i>
            </div>
            <div class="btn-text">
              <span>Fale no WhatsApp</span>
              <strong>Vendas WhatsApp</strong>
            </div>
          </div>
          <i class="fas fa-chevron-right btn-arrow" aria-hidden="true"></i>
        </a>

        <a
          href="tel:+551632411144"
          class="btn"
          aria-label="Ligar para o número 16 3241-1144"
        >
          <div class="btn-content">
            <div class="btn-icon">
              <i class="fas fa-phone" aria-hidden="true"></i>
            </div>
            <div class="btn-text">
              <span>Ligar agora</span>
              <strong>(16) 3241-1144</strong>
            </div>
          </div>
          <i class="fas fa-chevron-right btn-arrow" aria-hidden="true"></i>
        </a>

        <a
          href="https://www.cncshop.com.br"
          class="btn"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Abrir o site da CNCShop"
        >
          <div class="btn-content">
            <div class="btn-icon">
              <i class="fas fa-globe" aria-hidden="true"></i>
            </div>
            <div class="btn-text">
              <span>Nossa loja</span>
              <strong>www.cncshop.com.br</strong>
            </div>
          </div>
          <i class="fas fa-chevron-right btn-arrow" aria-hidden="true"></i>
        </a>

        <a
          href="https://maps.app.goo.gl/YourLink"
          class="btn"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Abrir localização da empresa"
        >
          <div class="btn-content">
            <div class="btn-icon">
              <i class="fas fa-location-dot" aria-hidden="true"></i>
            </div>
            <div class="btn-text">
              <span>Localização</span>
              <strong>Nosso endereço</strong>
            </div>
          </div>
          <i class="fas fa-chevron-right btn-arrow" aria-hidden="true"></i>
        </a>

        <a
          href="mailto:vendas@cncshop.com.br"
          class="btn"
          aria-label="Enviar e-mail para vendas arroba cncshop ponto com ponto br"
        >
          <div class="btn-content">
            <div class="btn-icon">
              <i class="fas fa-envelope" aria-hidden="true"></i>
            </div>
            <div class="btn-text">
              <span>Envie um e-mail</span>
              <strong>vendas@cncshop.com.br</strong>
            </div>
          </div>
          <i class="fas fa-chevron-right btn-arrow" aria-hidden="true"></i>
        </a>
      </nav>

      <footer class="footer">
        <p class="footer-text">
          <strong>Grupo Manutex CNC</strong> © 2026
        </p>
      </footer>
    </section>
  </main>
</body>
</html>
